name: Build Logic
on:
  workflow_call:
    inputs:
      is_release:
        type: boolean
        default: false
      tag_name:
        type: string

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    outputs:
      build_date: ${{ steps.date.outputs.now }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v4

      - name: Generate Timestamp
        id: date
        shell: bash
        run: echo "now=$(date +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true

      - name: Publish Main App
        run: |
          dotnet publish ./FloodForge/FloodForge.csproj -c Release -o ./publish-temp --self-contained true -r ${{ matrix.os == 'ubuntu-latest' && 'linux-x64' || 'win-x64' }}

      - name: Publish Patcher
        run: |
          dotnet publish ./FloodForge.Patcher/FloodForge.Patcher.csproj -c Release -o ./publish-temp --self-contained true -r ${{ matrix.os == 'ubuntu-latest' && 'linux-x64' || 'win-x64' }}

      - name: Prepare & Zip (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p ./publish-temp/mods ./publish-temp/assets ./publish-temp/docs
          cp -r ./FloodForge/assets/. ./publish-temp/assets/ 2>/dev/null || true
          cp -r ./FloodForge/docs/. ./publish-temp/docs/ 2>/dev/null || true
          if [ "${{ inputs.is_release }}" = "false" ]; then
            echo "${{ steps.date.outputs.now }}" > ./publish-temp/assets/nightly.txt
          fi
          cd publish-temp && zip -r ../FloodForge-linux.zip .

      - name: Prepare & Zip (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "./publish-temp/mods", "./publish-temp/assets", "./publish-temp/docs"
          if (Test-Path "./FloodForge/assets") { Copy-Item -Path "./FloodForge/assets/*" -Destination "./publish-temp/assets/" -Recurse -Force }
          if (Test-Path "./FloodForge/docs") { Copy-Item -Path "./FloodForge/docs/*" -Destination "./publish-temp/docs/" -Recurse -Force }
          if ("${{ inputs.is_release }}" -eq "false") {
            Set-Content -Path "./publish-temp/assets/nightly.txt" -Value "${{ steps.date.outputs.now }}"
          }
          Set-Location ./publish-temp
          Compress-Archive -Path * -DestinationPath ../FloodForge-windows.zip

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}
          path: FloodForge-*.zip
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Handle Nightly Cleanup
        if: ${{ !inputs.is_release }}
        run: |
          gh release delete nightly --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.is_release && inputs.tag_name || 'nightly' }}
          name: ${{ inputs.is_release && format('FloodForge {0}', inputs.tag_name) || 'Nightly Development Build' }}
          prerelease: ${{ !inputs.is_release }}
          draft: ${{ inputs.is_release }}
          files: ./artifacts/FloodForge-*.zip
          body: |
            ${{ inputs.is_release && '' || format('BUILD_DATE: {0}', needs.build.outputs.build_date) }}
