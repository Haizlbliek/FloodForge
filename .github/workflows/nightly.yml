name: Nightly Build
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zip libsdl2-dev libglfw3-dev libutf8proc-dev

      - name: Install Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          vcpkg install utf8proc:x64-mingw-static sdl2:x64-mingw-static glfw3:x64-mingw-static
          cp C:/vcpkg/installed/x64-mingw-static/lib/libutf8proc.a lib/
          cp C:/vcpkg/installed/x64-mingw-static/lib/libglfw3.a lib/GLFW/

      - name: Run Build Script
        shell: bash
        run: |
          chmod +x ./build.sh
          ./build.sh --release

      - name: Upload to Nightly Release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "nightly"
          prerelease: true
          title: "Nightly Development Build"
          files: |
            FloodForge-*.zip