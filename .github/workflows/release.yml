name: Release Build

on:
  push:
    tags:
      - "v*"

jobs:
  create-draft:
    name: Create Draft Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      clean_version: ${{ steps.version.outputs.CLEAN_VERSION }}
    steps:
      - name: Set Clean Version
        id: version
        run: |
          VERSION=${{ github.ref_name }}
          echo "CLEAN_VERSION=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "CLEAN_VERSION=${VERSION#v}" >> $GITHUB_ENV

      - name: Create Draft
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FloodForge ${{ env.CLEAN_VERSION }}
          draft: true
          prerelease: false

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zip libsdl2-dev libglfw3-dev libutf8proc-dev

      - name: Install Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          vcpkg install utf8proc:x64-mingw-static sdl2:x64-mingw-static glfw3:x64-mingw-static
          cp C:/vcpkg/installed/x64-mingw-static/lib/libutf8proc.a lib/
          cp C:/vcpkg/installed/x64-mingw-static/lib/libglfw3.a lib/GLFW/

      - name: Run Build Script
        shell: bash
        run: |
          chmod +x ./build.sh
          ./build.sh --release

      - name: Upload Artifacts to Workflow
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}
          path: FloodForge-*.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Upload to Existing Draft
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ./artifacts/FloodForge-*.zip
          draft: true